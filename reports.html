<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarAdmin — Reports</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="main">
        <div class="topbar">
          <button class="menu-toggle">☰</button>
          <div>
            <h2>Reports</h2>
            <p>Manage reported car listings</p>
          </div>
          <div></div>
        </div>

        <div class="content">
          <div class="section-header">
            <h3>All Reports</h3>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Report ID</th>
                  <th>Listing ID</th>
                  <th>Reported By (UID)</th>
                  <th>Reason</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="reports-tbody">
                <tr>
                  <td colspan="5">
                    <div class="loading">
                      <div class="spinner"></div>
                      Loading...
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Report Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
      <div class="modal">
        <button class="modal-close" onclick="closeDetail()">✕</button>
        <h3>Report Details</h3>
        <div id="modal-body"></div>
        <div id="listing-info" style="margin-top: 14px; display: none">
          <hr style="border-color: #263548; margin-bottom: 14px" />
          <p
            style="
              font-size: 11px;
              color: var(--white-semi);
              margin-bottom: 8px;
              text-transform: uppercase;
              letter-spacing: 0.04em;
            "
          >
            Reported Listing
          </p>
          <img
            id="modal-car-img"
            class="modal-img"
            src=""
            alt=""
            style="display: none"
          />
          <div id="modal-listing-body"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeDetail()">Close</button>
          <button
            class="btn btn-red"
            id="modal-delete-btn"
            style="display: none"
          >
            🗑 Delete Report
          </button>
        </div>
      </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="confirm-modal">
      <div class="modal confirm-modal">
        <div class="confirm-icon">⚠️</div>
        <h3>Delete Report?</h3>
        <p id="confirm-msg">Remove this report record permanently?</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
          <button class="btn btn-red" onclick="confirmDelete()">Delete</button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
      let allReports = [];
      let deleteReportId = null;

      requireAdmin(function (user) {
        renderSidebar("reports");
        setAdminName(user);
        loadReports();
      });

      function loadReports() {
        db.ref("carListingReports").once("value", function (snap) {
          const tbody = document.getElementById("reports-tbody");
          if (!snap.exists()) {
            tbody.innerHTML = emptyRow(5, "🚩", "No reports found.");
            return;
          }
          allReports = [];
          snap.forEach(function (child) {
            allReports.push(child.val());
          });
          allReports.reverse();
          renderReports(allReports);
        });
      }

      function renderReports(list) {
        const tbody = document.getElementById("reports-tbody");
        if (!list.length) {
          tbody.innerHTML = emptyRow(5, "🔍", "No reports to show.");
          return;
        }
        tbody.innerHTML = list
          .map(function (r) {
            return `<tr>
        <td><code style="font-size:11px;color:var(--white-semi)">${esc(r.reportId)}</code></td>
        <td><code style="font-size:11px;color:var(--light-blue)">${esc(r.listingId)}</code></td>
        <td><code style="font-size:11px;color:var(--white-semi)">${esc(r.reportedByUid)}</code></td>
        <td><span class="badge badge-red">${esc(r.reason)}</span></td>
        <td style="display:flex;gap:6px">
          <button class="btn btn-blue btn-sm" onclick='viewReport(${JSON.stringify(r)})'>👁 View</button>
          <button class="btn btn-red btn-sm" onclick="askDelete('${esc(r.reportId)}')">🗑 Delete</button>
        </td>
      </tr>`;
          })
          .join("");
      }

      function viewReport(r) {
        document.getElementById("modal-body").innerHTML = [
          row("Report ID", r.reportId),
          row("Listing ID", r.listingId),
          row("Reported By", r.reportedByUid),
          row("Reason", r.reason),
        ].join("");

        // Also load the listing info
        const listingSection = document.getElementById("listing-info");
        if (r.listingId) {
          db.ref("carListing/" + r.listingId).once("value", function (snap) {
            if (snap.exists()) {
              const c = snap.val();
              const img = document.getElementById("modal-car-img");
              if (c.carImage) {
                img.src = c.carImage;
                img.style.display = "block";
              }
              document.getElementById("modal-listing-body").innerHTML = [
                row("Car", c.carName),
                row("Price", "₱" + (c.carPrice || "—")),
                row("Seller", c.carListerName),
              ].join("");
              listingSection.style.display = "block";
            }
          });
        }

        document.getElementById("modal-delete-btn").style.display =
          "inline-flex";
        document.getElementById("modal-delete-btn").onclick = function () {
          closeDetail();
          askDelete(r.reportId);
        };
        document.getElementById("detail-modal").classList.add("open");
      }

      function closeDetail() {
        document.getElementById("detail-modal").classList.remove("open");
        document.getElementById("listing-info").style.display = "none";
        document.getElementById("modal-car-img").style.display = "none";
      }

      function askDelete(reportId) {
        deleteReportId = reportId;
        document.getElementById("confirm-msg").textContent =
          "Remove this report record permanently?";
        document.getElementById("confirm-modal").classList.add("open");
      }

      function closeConfirm() {
        deleteReportId = null;
        document.getElementById("confirm-modal").classList.remove("open");
      }
      function confirmDelete() {
        if (!deleteReportId) return;

        // Find the report to get its listingId before deleting
        db.ref("carListingReports/" + deleteReportId).once(
          "value",
          function (snap) {
            const report = snap.val();

            // Delete the report record
            db.ref("carListingReports/" + deleteReportId).remove();

            // Also delete the actual car listing if listingId exists
            if (report && report.listingId) {
              db.ref("carListing/" + report.listingId).remove();
            }

            closeConfirm();
            loadReports();
          },
        );
      }

      function row(label, value) {
        return `<div class="detail-row"><span class="label">${label}</span><span class="value">${esc(value)}</span></div>`;
      }

      function esc(str) {
        if (!str) return "—";
        return String(str).replace(/[&<>"']/g, function (c) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[c];
        });
      }

      function emptyRow(cols, icon, msg) {
        return `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-icon">${icon}</div>${msg}</div></td></tr>`;
      }

      ["detail-modal", "confirm-modal"].forEach(function (id) {
        document.getElementById(id).addEventListener("click", function (e) {
          if (e.target === this) {
            closeDetail();
            closeConfirm();
          }
        });
      });
    </script>
  </body>
</html>
