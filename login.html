<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarAdmin — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🚗</div>
      <div>
        <h1>CarAdmin</h1>
        <span>Car Listing Platform</span>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p>Sign in with your admin account to continue.</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="admin@example.com" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>

    <button class="btn-primary" onclick="doLogin()">Sign In</button>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Firebase SDKs (compat version for simplicity) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    // If already logged in as admin, go straight to dashboard
    auth.onAuthStateChanged(function (user) {
      if (user) {
        db.ref("users/" + user.uid + "/role").once("value", function (snap) {
          if (snap.val() === "admin") window.location.href = "dashboard.html";
        });
      }
    });

    function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("error-msg");
      errEl.textContent = "";

      if (!email || !password) {
        errEl.textContent = "Please enter your email and password.";
        return;
      }

      auth.signInWithEmailAndPassword(email, password)
        .then(function (cred) {
          // Check admin role
          return db.ref("users/" + cred.user.uid + "/role").once("value");
        })
        .then(function (snap) {
          if (snap.val() === "admin") {
            window.location.href = "dashboard.html";
          } else {
            errEl.textContent = "Access denied. This account is not an admin.";
            auth.signOut();
          }
        })
        .catch(function (err) {
          errEl.textContent = err.message;
        });
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
