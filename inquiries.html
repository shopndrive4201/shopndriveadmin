<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarAdmin — Inquiries</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="main">
        <div class="topbar">
          <button class="menu-toggle">☰</button>
          <div>
            <h2>Inquiries</h2>
            <p>View all buyer-seller car inquiries</p>
          </div>
          <div></div>
        </div>

        <div class="content">
          <div class="section-header">
            <h3>All Inquiries</h3>
            <input
              class="search-input"
              type="text"
              id="search"
              placeholder="🔍 Search by name or car…"
              oninput="filterInquiries()"
            />
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Inquirer</th>
                  <th>Car</th>
                  <th>Owner</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="inquiries-tbody">
                <tr>
                  <td colspan="5">
                    <div class="loading">
                      <div class="spinner"></div>
                      Loading...
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Inquiry Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
      <div class="modal">
        <button class="modal-close" onclick="closeDetail()">✕</button>
        <h3>Inquiry Details</h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeDetail()">Close</button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
      let allInquiries = [];

      requireAdmin(function (user) {
        renderSidebar("inquiries");
        setAdminName(user);
        loadInquiries();
      });

      function loadInquiries() {
        db.ref("carInquiries").once("value", function (snap) {
          const tbody = document.getElementById("inquiries-tbody");
          if (!snap.exists()) {
            tbody.innerHTML = emptyRow(5, "💬", "No inquiries found.");
            return;
          }
          allInquiries = [];
          snap.forEach(function (child) {
            allInquiries.push(child.val());
          });
          allInquiries.reverse();
          renderInquiries(allInquiries);
        });
      }

      function renderInquiries(list) {
        const tbody = document.getElementById("inquiries-tbody");
        if (!list.length) {
          tbody.innerHTML = emptyRow(5, "🔍", "No matching inquiries.");
          return;
        }
        tbody.innerHTML = list
          .map(function (q) {
            const statusBadge = statusBadgeFn(q.inquiredStatus);
            return `<tr>
        <td>
          <img class="avatar" src="${q.inquirerImage || ""}" onerror="this.style.display='none'" alt="" />
          ${esc(q.inquirerName)}
        </td>
        <td>
          <img class="car-thumb" src="${q.inquiredCarImage || ""}" onerror="this.style.visibility='hidden'" alt="" />
          ${esc(q.inquiredCarName)}
          <br/><small style="color:var(--white-semi)">₱${esc(q.inquiredCarPrice)}</small>
        </td>
        <td>${esc(q.carOwnerName)}</td>
        <td>${statusBadge}</td>
        <td>
          <button class="btn btn-blue btn-sm" onclick='viewInquiry(${JSON.stringify(q)})'>👁 View</button>
        </td>
      </tr>`;
          })
          .join("");
      }

      function filterInquiries() {
        const q = document.getElementById("search").value.toLowerCase();
        renderInquiries(
          allInquiries.filter(function (i) {
            return (
              (i.inquirerName || "").toLowerCase().includes(q) ||
              (i.inquiredCarName || "").toLowerCase().includes(q) ||
              (i.carOwnerName || "").toLowerCase().includes(q)
            );
          }),
        );
      }

      function viewInquiry(q) {
        document.getElementById("modal-body").innerHTML = [
          `<p style="font-size:11px;color:var(--white-semi);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Inquirer</p>`,
          row("Name", q.inquirerName),
          row("Email", q.inquirerEmail),
          row("Phone", q.inquirerNumber),
          row("Message", q.inquirerMessage),
          `<hr style="border-color:#263548;margin:14px 0"/>`,
          `<p style="font-size:11px;color:var(--white-semi);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Car Info</p>`,
          `<img src="${q.inquiredCarImage || ""}" class="modal-img" onerror="this.style.display='none'" alt=""/>`,
          row("Car", q.inquiredCarName),
          row("Price", "₱" + (q.inquiredCarPrice || "—")),
          row("Location", q.location),
          row("Status", q.inquiredStatus),
          `<hr style="border-color:#263548;margin:14px 0"/>`,
          `<p style="font-size:11px;color:var(--white-semi);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Car Owner</p>`,
          row("Name", q.carOwnerName),
          row("Email", q.carOwnerEmail),
          row("Phone", q.carOwnerNumber),
          row("Response", q.carOwnerResponse || "No response yet"),
        ].join("");
        document.getElementById("detail-modal").classList.add("open");
      }

      function closeDetail() {
        document.getElementById("detail-modal").classList.remove("open");
      }

      function statusBadgeFn(status) {
        const map = {
          pending: "badge-yellow",
          responded: "badge-blue",
          closed: "badge-green",
          cancelled: "badge-red",
        };
        const cls = map[(status || "").toLowerCase()] || "badge-yellow";
        return `<span class="badge ${cls}">${esc(status) || "Pending"}</span>`;
      }

      function row(label, value) {
        return `<div class="detail-row"><span class="label">${label}</span><span class="value">${esc(value)}</span></div>`;
      }

      function esc(str) {
        if (!str) return "—";
        return String(str).replace(/[&<>"']/g, function (c) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[c];
        });
      }

      function emptyRow(cols, icon, msg) {
        return `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-icon">${icon}</div>${msg}</div></td></tr>`;
      }

      document
        .getElementById("detail-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeDetail();
        });
    </script>
  </body>
</html>
