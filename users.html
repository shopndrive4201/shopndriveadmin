<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarAdmin — Users</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="layout">

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle">☰</button>
      <div>
        <h2>User Management</h2>
        <p>View, search, and manage platform users</p>
      </div>
      <div></div>
    </div>

    <div class="content">
      <div class="section-header">
        <h3>All Users</h3>
        <input class="search-input" type="text" id="search" placeholder="🔍 Search by name or email…" oninput="filterUsers()" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="5"><div class="loading"><div class="spinner"></div> Loading...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal confirm-modal">
    <div class="confirm-icon">⚠️</div>
    <h3>Delete User?</h3>
    <p id="confirm-msg">This will permanently remove this user from the database.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-red" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script>
  let allUsers = [];
  let deleteUid = null;

  requireAdmin(function (user) {
    renderSidebar("users");
    setAdminName(user);
    loadUsers();
  });

  function loadUsers() {
    db.ref("users").once("value", function (snap) {
      const tbody = document.getElementById("users-tbody");
      if (!snap.exists()) {
        tbody.innerHTML = emptyRow(5, "👥", "No users found.");
        return;
      }
      allUsers = [];
      snap.forEach(function (child) { allUsers.push(child.val()); });
      renderUsers(allUsers);
    });
  }

  function renderUsers(list) {
    const tbody = document.getElementById("users-tbody");
    if (!list.length) {
      tbody.innerHTML = emptyRow(5, "🔍", "No matching users.");
      return;
    }
    tbody.innerHTML = list.map(function (u) {
      const roleBadge = u.role === "admin"
        ? `<span class="badge badge-blue">Admin</span>`
        : `<span class="badge badge-green">User</span>`;
      return `<tr>
        <td>
          <img class="avatar" src="${u.imageUrl || ''}" onerror="this.style.display='none'" alt="" />
          ${esc(u.fullname)}
        </td>
        <td>${esc(u.email)}</td>
        <td>${esc(u.phoneNumber)}</td>
        <td>${roleBadge}</td>
        <td>
          <button class="btn btn-red btn-sm" onclick="askDelete('${u.uid}','${esc(u.fullname)}')">🗑 Delete</button>
        </td>
      </tr>`;
    }).join("");
  }

  function filterUsers() {
    const q = document.getElementById("search").value.toLowerCase();
    const filtered = allUsers.filter(function (u) {
      return (u.fullname || "").toLowerCase().includes(q)
          || (u.email || "").toLowerCase().includes(q);
    });
    renderUsers(filtered);
  }

  function askDelete(uid, name) {
    deleteUid = uid;
    document.getElementById("confirm-msg").textContent = `Delete "${name}"? This cannot be undone.`;
    document.getElementById("confirm-modal").classList.add("open");
  }

  function closeConfirm() {
    deleteUid = null;
    document.getElementById("confirm-modal").classList.remove("open");
  }

  function confirmDelete() {
    if (!deleteUid) return;
    db.ref("users/" + deleteUid).remove().then(function () {
      closeConfirm();
      loadUsers();
    }).catch(function (e) { alert("Error: " + e.message); });
  }

  function esc(str) {
    if (!str) return "—";
    return String(str).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function emptyRow(cols, icon, msg) {
    return `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-icon">${icon}</div>${msg}</div></td></tr>`;
  }

  // Close modal on overlay click
  document.getElementById("confirm-modal").addEventListener("click", function (e) {
    if (e.target === this) closeConfirm();
  });
</script>
</body>
</html>
