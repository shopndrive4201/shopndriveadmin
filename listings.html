<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarAdmin — Car Listings</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="layout">
      <div class="main">
        <div class="topbar">
          <button class="menu-toggle">☰</button>
          <div>
            <h2>Car Listings</h2>
            <p>Browse and manage all car listings</p>
          </div>
          <div></div>
        </div>

        <div class="content">
          <div class="section-header">
            <h3>All Listings</h3>
            <input
              class="search-input"
              type="text"
              id="search"
              placeholder="🔍 Search by car name or location…"
              oninput="filterListings()"
            />
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Car</th>
                  <th>Price</th>
                  <th>Location</th>
                  <th>Status</th>
                  <th>Docs</th>
                  <th>Date Posted</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="listings-tbody">
                <tr>
                  <td colspan="5">
                    <div class="loading">
                      <div class="spinner"></div>
                      Loading...
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- View Details Modal -->
    <div class="modal-overlay" id="detail-modal">
      <div class="modal">
        <button class="modal-close" onclick="closeDetail()">✕</button>
        <h3>Listing Details</h3>
        <img id="modal-car-img" class="modal-img" src="" alt="Car Image" />
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeDetail()">Close</button>
          <button
            class="btn btn-blue"
            id="modal-verify-btn"
            style="display: none"
          >
            ✔ Verify Docs
          </button>
          <button
            class="btn btn-red"
            id="modal-reject-docs-btn"
            style="display: none"
          >
            ✖ Reject Docs
          </button>
          <button class="btn btn-red" id="modal-delete-btn">
            🗑 Delete Listing
          </button>
        </div>
      </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="confirm-modal">
      <div class="modal confirm-modal">
        <div class="confirm-icon">⚠️</div>
        <h3>Delete Listing?</h3>
        <p id="confirm-msg">This will permanently remove this listing.</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
          <button class="btn btn-red" onclick="confirmDelete()">Delete</button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
      let allListings = [];
      let deleteId = null;

      requireAdmin(function (user) {
        renderSidebar("listings");
        setAdminName(user);
        loadListings();
      });

      function loadListings() {
        db.ref("carListing").once("value", function (snap) {
          const tbody = document.getElementById("listings-tbody");
          if (!snap.exists()) {
            tbody.innerHTML = emptyRow(5, "🚗", "No listings found.");
            return;
          }
          allListings = [];
          snap.forEach(function (child) {
            allListings.push(child.val());
          });
          allListings.reverse();
          renderListings(allListings);
        });
      }

      function renderListings(list) {
        const tbody = document.getElementById("listings-tbody");
        if (!list.length) {
          tbody.innerHTML = emptyRow(7, "🔍", "No matching listings.");
          return;
        }
        tbody.innerHTML = list
          .map(function (c) {
            const status = c.carListingStatus || "pending";
            const statusBadge =
              status === "approved"
                ? `<span class="badge badge-green">Approved</span>`
                : `<span class="badge badge-yellow">Pending</span>`;

            const docsStatus = c.carDocsStatus || "unverified";
            const docsBadge =
              docsStatus === "verified"
                ? `<span class="badge badge-green">Verified</span>`
                : docsStatus === "rejected"
                  ? `<span class="badge badge-red">Rejected</span>`
                  : `<span class="badge badge-yellow">Unverified</span>`;

            const approveBtn =
              status !== "approved"
                ? `<button class="btn btn-blue btn-sm" onclick="approveListing('${esc(c.listingId)}')">✔ Approve</button>`
                : ``;

            return `<tr>
      <td>
        <img class="car-thumb" src="${c.carImage || ""}" onerror="this.style.visibility='hidden'" alt="" />
        <strong>${esc(c.carName)}</strong>
      </td>
      <td>₱${esc(c.carPrice)}</td>
      <td>${esc(c.carLocation)}</td>
      <td>${statusBadge}</td>
      <td>${docsBadge}</td>
      <td>${esc(c.datePosted)}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick='viewListing(${JSON.stringify(c)})'>👁 View</button>
        ${approveBtn}
        <button class="btn btn-red btn-sm" onclick="askDelete('${esc(c.listingId)}','${esc(c.carName)}')">✖ Reject</button>
      </td>
    </tr>`;
          })
          .join("");
      }

      function approveListing(listingId) {
        db.ref("carListing/" + listingId)
          .update({ carListingStatus: "approved" })
          .then(function () {
            loadListings();
          })
          .catch(function (e) {
            alert("Error: " + e.message);
          });
      }

      function filterListings() {
        const q = document.getElementById("search").value.toLowerCase();
        renderListings(
          allListings.filter(function (c) {
            return (
              (c.carName || "").toLowerCase().includes(q) ||
              (c.carLocation || "").toLowerCase().includes(q)
            );
          }),
        );
      }

      function viewListing(c) {
        document.getElementById("modal-car-img").src = c.carImage || "";

        const docsStatus = c.carDocsStatus || "unverified";
        const docsBadge =
          docsStatus === "verified"
            ? `<span class="badge badge-green">Verified</span>`
            : docsStatus === "rejected"
              ? `<span class="badge badge-red">Rejected</span>`
              : `<span class="badge badge-yellow">Unverified</span>`;

        document.getElementById("modal-body").innerHTML = [
          row("Car Name", c.carName),
          row("Price", "₱" + (c.carPrice || "—")),
          row("Location", c.carLocation),
          row("Description", c.carDescription),
          row("Date Posted", c.datePosted + " " + (c.timePosted || "")),
          `<hr style="border-color:#263548;margin:14px 0"/>`,
          `<p style="font-size:11px;color:var(--white-semi);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Seller Info</p>`,
          row("Name", c.carListerName),
          row("Email", c.carListerEmail),
          row("Phone", c.carListerNumber),
          row("Role", c.carListerRole),
          `<hr style="border-color:#263548;margin:14px 0"/>`,
          `<p style="font-size:11px;color:var(--white-semi);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em">Car Documents (OR/CR)</p>`,
          c.carDocs
            ? `<img src="${c.carDocs}" class="modal-img" style="cursor:pointer" onclick="window.open('${c.carDocs}','_blank')" title="Click to open full image" alt="OR/CR Document"/>`
            : `<p style="color:var(--white-semi);font-size:13px;margin-bottom:10px">No document uploaded.</p>`,
          `<div class="detail-row"><span class="label">Docs Status</span><span class="value">${docsBadge}</span></div>`,
        ].join("");

        // Show verify/reject docs buttons only if docs exist
        const verifyBtn = document.getElementById("modal-verify-btn");
        const rejectDocsBtn = document.getElementById("modal-reject-docs-btn");

        if (c.carDocs) {
          verifyBtn.style.display =
            docsStatus !== "verified" ? "inline-flex" : "none";
          rejectDocsBtn.style.display =
            docsStatus !== "rejected" ? "inline-flex" : "none";
          verifyBtn.onclick = function () {
            updateDocsStatus(c.listingId, "verified");
          };
          rejectDocsBtn.onclick = function () {
            updateDocsStatus(c.listingId, "rejected");
          };
        } else {
          verifyBtn.style.display = "none";
          rejectDocsBtn.style.display = "none";
        }

        document.getElementById("modal-delete-btn").onclick = function () {
          closeDetail();
          askDelete(c.listingId, c.carName);
        };

        document.getElementById("detail-modal").classList.add("open");
      }

      function closeDetail() {
        document.getElementById("detail-modal").classList.remove("open");
      }

      function askDelete(id, name) {
        deleteId = id;
        document.getElementById("confirm-msg").textContent =
          `Delete "${name}"? This cannot be undone.`;
        document.getElementById("confirm-modal").classList.add("open");
      }

      function closeConfirm() {
        deleteId = null;
        document.getElementById("confirm-modal").classList.remove("open");
      }

      function updateDocsStatus(listingId, status) {
        db.ref("carListing/" + listingId)
          .update({ carDocsStatus: status })
          .then(function () {
            closeDetail();
            loadListings();
          })
          .catch(function (e) {
            alert("Error: " + e.message);
          });
      }

      function confirmDelete() {
        if (!deleteId) return;
        db.ref("carListing/" + deleteId)
          .remove()
          .then(function () {
            closeConfirm();
            loadListings();
          })
          .catch(function (e) {
            alert("Error: " + e.message);
          });
      }

      function row(label, value) {
        return `<div class="detail-row"><span class="label">${label}</span><span class="value">${esc(value)}</span></div>`;
      }

      function esc(str) {
        if (!str) return "—";
        return String(str).replace(/[&<>"']/g, function (c) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          }[c];
        });
      }

      function emptyRow(cols, icon, msg) {
        return `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-icon">${icon}</div>${msg}</div></td></tr>`;
      }

      // Close modals on overlay click
      ["detail-modal", "confirm-modal"].forEach(function (id) {
        document.getElementById(id).addEventListener("click", function (e) {
          if (e.target === this) {
            closeDetail();
            closeConfirm();
          }
        });
      });
    </script>
  </body>
</html>
